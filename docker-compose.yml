services:
  # ──────────────────────────────────────────
  # Frontend – React / Vite
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production        # change to "dev" for hot-reload development
      args:
        VITE_BACKEND_ENDPOINT: ${VITE_BACKEND_ENDPOINT:-http://localhost:8000}
    image: sheltra-frontend:latest
    container_name: sheltra_frontend
    ports:
      - "3000:80"               # host:container  (80 inside Nginx)
    restart: unless-stopped
    networks:
      - sheltra_network

  # ──────────────────────────────────────────
  # Frontend – development mode (hot-reload)
  # ──────────────────────────────────────────
  frontend-dev:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: dev
      args:
        VITE_BACKEND_ENDPOINT: ${VITE_BACKEND_ENDPOINT:-http://localhost:8000}
    image: sheltra-frontend-dev:latest
    container_name: sheltra_frontend_dev
    ports:
      - "3000:3000"
    volumes:
      - ./client/src:/app/src        # live source sync
      - ./client/public:/app/public
    environment:
      - VITE_BACKEND_ENDPOINT=${VITE_BACKEND_ENDPOINT:-http://localhost:8000}
    restart: unless-stopped
    networks:
      - sheltra_network
    profiles:
      - dev                          # only started with: docker compose --profile dev up

  # ──────────────────────────────────────────
  # Backend – Laravel / PHP / Apache
  # ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: sheltra-backend:latest
    container_name: sheltra_backend
    ports:
      - "8000:80"                    # host:container (80/Apache)
    environment:
      - APP_NAME=Sheltra
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - FRONTEND_URL=http://localhost:5173
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=sheltra_db
      - DB_USERNAME=sheltra_user
      - DB_PASSWORD=sheltra_password
    volumes:
      - ./server:/var/www/html
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - sheltra_network
    command: sh -c "composer install && php artisan key:generate && php artisan migrate --seed && apache2-foreground"

  # ──────────────────────────────────────────
  # Database – MySQL
  # ──────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: sheltra_db
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=sheltra_db
      - MYSQL_USER=sheltra_user
      - MYSQL_PASSWORD=sheltra_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - sheltra_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

volumes:
  db_data:

networks:
  sheltra_network:
    driver: bridge
