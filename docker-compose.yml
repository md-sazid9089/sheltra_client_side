services:
  # ──────────────────────────────────────────
  # Database – MySQL
  # ──────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: sheltra_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-sheltra_db}
      MYSQL_USER: ${DB_USERNAME:-sheltra}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - sheltra_db_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - sheltra_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Backend – Laravel / PHP / Apache
  # ──────────────────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: sheltra-backend:latest
    container_name: sheltra_backend
    ports:
      - "8000:80"
    environment:
      APP_NAME: ${APP_NAME:-Sheltra}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-base64:xSomeRandomKeyHere=}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-sheltra_db}
      DB_USERNAME: ${DB_USERNAME:-sheltra}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sheltra_network

volumes:
  sheltra_db_data:

networks:
  sheltra_network:
    driver: bridge
